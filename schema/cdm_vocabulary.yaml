        description: Updated
slots:
  concept__concept_id:
    name: concept__concept_id
    description: Unique identifier for the concept in the OMOP CDM.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/concept_id
    identifier: true
    alias: concept_id
    owner: Concept
    domain_of:
    - Concept
    range: integer
    required: true
  concept__concept_name:
    name: concept__concept_name
    description: An unambiguous, meaningful and descriptive name for the Concept.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/concept_name
    alias: concept_name
    owner: Concept
    domain_of:
    - Concept
    range: string
    required: true
  concept__concept_code:
    name: concept__concept_code
    description: The concept code represents the identifier of the Concept in the
      source vocabulary, such as SNOMED-CT concept IDs, RxNorm RXCUIs etc. Note that
      concept codes are not unique across vocabularies.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/concept_code
    alias: concept_code
    owner: Concept
    domain_of:
    - Concept
    range: string
    required: true
  concept__domain_id:
    name: concept__domain_id
    description: A foreign key to the [DOMAIN](https://ohdsi.github.io/CommonDataModel/cdm54.html#domain)
      table the Concept belongs to.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/domain_id
    alias: domain_id
    owner: Concept
    domain_of:
    - Concept
    range: Domain
    required: true
  concept__vocabulary_id:
    name: concept__vocabulary_id
    description: A foreign key to the [VOCABULARY](https://ohdsi.github.io/CommonDataModel/cdm54.html#vocabulary)
      table indicating from which source the Concept has been adapted.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/vocabulary_id
    alias: vocabulary_id
    owner: Concept
    domain_of:
    - Concept
    range: Vocabulary
    required: true
  concept__concept_class_id:
    name: concept__concept_class_id
    description: The attribute or concept class of the Concept. Examples are 'Clinical
      Drug', 'Ingredient', 'Clinical Finding' etc.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/concept_class_id
    alias: concept_class_id
    owner: Concept
    domain_of:
    - Concept
    range: ConceptClass
    required: true
  concept__standard_concept:
    name: concept__standard_concept
    description: This flag determines where a Concept is a Standard Concept, i.e.
      is used in the data, a Classification Concept, or a non-standard Source Concept.
      The allowable values are 'S' (Standard Concept) and 'C' (Classification Concept),
      otherwise the content is NULL.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/standard_concept
    alias: standard_concept
    owner: Concept
    domain_of:
    - Concept
    range: standard_concept
    required: false
  concept__valid_start_date:
    name: concept__valid_start_date
    description: The date when the Concept was first recorded. The default value is
      1-Jan-1970, meaning, the Concept has no (known) date of inception.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/valid_start_date
    alias: valid_start_date
    owner: Concept
    domain_of:
    - Concept
    range: date
    required: true
  concept__valid_end_date:
    name: concept__valid_end_date
    description: The date when the Concept became invalid because it was deleted or
      superseded (updated) by a new concept. The default value is 31-Dec-2099, meaning,
      the Concept is valid until it becomes deprecated.
    from_schema: https://athena.ohdsi.org/search-terms/terms#concept
    slot_uri: https://athena.ohdsi.org/search-terms/terms#concept/valid_end_date
    alias: valid_end_date
    owner: Concept
    domain_of:
    - Concept
    range: date
    required: true
  concept__invalid_reason:
