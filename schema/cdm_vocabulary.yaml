        identifier: true
        range: string
      vocabulary_name:
        name: vocabulary_name
        range: string
        required: true
      vocabulary_reference:
        name: vocabulary_reference
        range: string
        required: true
      vocabulary_version:
        name: vocabulary_version
        range: string
