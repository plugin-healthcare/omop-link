  ConceptClass:
    name: ConceptClass
    definition_uri: https://athena.ohdsi.org/search-terms/terms#concept/ConceptClass
    description: The CONCEPT_CLASS table includes semantic categories that reference
      the source structure of each Vocabulary.  Concept Classes represent so-called
      horizontal (e.g. MedDRA, RxNorm) or vertical levels (e.g. SNOMED) of the vocabulary
      structure.  Vocabularies without any Concept Classes, such as HCPCS, use the
      vocabulary_id as the Concept Class.  This reference table is populated with
