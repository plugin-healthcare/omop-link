name: omop-cdm54
id: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
imports:
- linkml:types
license: https://creativecommons.org/publicdomain/zero/1.0/
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  omop_cdm54:
    prefix_prefix: omop_cdm54
    prefix_reference: https://timformatie.github.io/SEIN-OMOP/omop-cdm54/
default_prefix: omop_cdm54
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
slots:
  cdmSource__cdm_source_name:
    name: cdmSource__cdm_source_name
    description: The name of the CDM instance.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_source_name
    alias: cdm_source_name
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
    required: true
  cdmSource__cdm_source_abbreviation:
    name: cdmSource__cdm_source_abbreviation
    description: The abbreviation of the CDM instance.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_source_abbreviation
    alias: cdm_source_abbreviation
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
    required: true
  cdmSource__cdm_holder:
    name: cdmSource__cdm_holder
    description: The holder of the CDM instance.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_holder
    alias: cdm_holder
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
    required: true
  cdmSource__source_description:
    name: cdmSource__source_description
    description: The description of the CDM instance.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:source_description
    alias: source_description
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
  cdmSource__source_documentation_reference:
    name: cdmSource__source_documentation_reference
    description: Refers to a publication or web resource describing the source data
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:source_documentation_reference
    alias: source_documentation_reference
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
  cdmSource__cdm_etl_reference:
    name: cdmSource__cdm_etl_reference
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_etl_reference
    alias: cdm_etl_reference
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
  cdmSource__source_release_date:
    name: cdmSource__source_release_date
    description: The date the data was extracted from the source system. In some systems
      that is the same as the date the ETL was run. Typically the latest even date
      in the source is on the source_release_date.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:source_release_date
    alias: source_release_date
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
    required: true
  cdmSource__cdm_release_date:
    name: cdmSource__cdm_release_date
    description: The date the ETL script was completed. Typically this is after the
      source_release_date.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_release_date
    alias: cdm_release_date
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
    required: true
  cdmSource__cdm_version:
    name: cdmSource__cdm_version
    description: Version of the OMOP CDM used as string. e.g. v5.4
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_version
    alias: cdm_version
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
  cdmSource__cdm_version_concept_id:
    name: cdmSource__cdm_version_concept_id
    description: The Concept Id representing the version of the CDM.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:cdm_version_concept_id
    alias: cdm_version_concept_id
    owner: CdmSource
    domain_of:
    - CdmSource
    range: Concept
    required: true
  cdmSource__vocabulary_version:
    name: cdmSource__vocabulary_version
    description: Version of the OMOP standardised vocabularies loaded
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:vocabulary_version
    alias: vocabulary_version
    owner: CdmSource
    domain_of:
    - CdmSource
    range: string
    required: true
  conceptAncestor__ancestor_concept_id:
    name: conceptAncestor__ancestor_concept_id
    description: The Concept Id for the higher-level concept that forms the ancestor
      in the relationship.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:ancestor_concept_id
    alias: ancestor_concept_id
    owner: ConceptAncestor
    domain_of:
    - ConceptAncestor
    range: Concept
    required: true
  conceptAncestor__descendant_concept_id:
    name: conceptAncestor__descendant_concept_id
    description: The Concept Id for the lower-level concept that forms the descendant
      in the relationship.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:descendant_concept_id
    alias: descendant_concept_id
    owner: ConceptAncestor
    domain_of:
    - ConceptAncestor
    range: Concept
    required: true
  conceptAncestor__min_levels_of_separation:
    name: conceptAncestor__min_levels_of_separation
    description: The minimum separation in number of levels of hierarchy between ancestor
      and descendant concepts. This is an attribute that is used to simplify hierarchic
      analysis.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:min_levels_of_separation
    alias: min_levels_of_separation
    owner: ConceptAncestor
    domain_of:
    - ConceptAncestor
    range: string
    required: true
  conceptAncestor__max_levels_of_separation:
    name: conceptAncestor__max_levels_of_separation
    description: The maximum separation in number of levels of hierarchy between ancestor
      and descendant concepts. This is an attribute that is used to simplify hierarchic
      analysis.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:max_levels_of_separation
    alias: max_levels_of_separation
    owner: ConceptAncestor
    domain_of:
    - ConceptAncestor
    range: string
    required: true
  conceptClass__concept_class_id:
    name: conceptClass__concept_class_id
    description: A unique key for each class.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_class_id
    identifier: true
    alias: concept_class_id
    owner: ConceptClass
    domain_of:
    - ConceptClass
    range: string
    required: true
  conceptClass__concept_class_name:
    name: conceptClass__concept_class_name
    description: The name describing the Concept Class, e.g. Clinical Finding, Ingredient,
      etc.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_class_name
    alias: concept_class_name
    owner: ConceptClass
    domain_of:
    - ConceptClass
    range: string
    required: true
  conceptClass__concept_class_concept_id:
    name: conceptClass__concept_class_concept_id
    description: A Concept that represents the Concept Class.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_class_concept_id
    alias: concept_class_concept_id
    owner: ConceptClass
    domain_of:
    - ConceptClass
    range: Concept
    required: true
  conceptRelation__concept_id_1:
    name: conceptRelation__concept_id_1
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_id_1
    alias: concept_id_1
    owner: ConceptRelation
    domain_of:
    - ConceptRelation
    range: Concept
    required: true
  conceptRelation__concept_id_2:
    name: conceptRelation__concept_id_2
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_id_2
    alias: concept_id_2
    owner: ConceptRelation
    domain_of:
    - ConceptRelation
    range: Concept
    required: true
  conceptRelation__relationship_id:
    name: conceptRelation__relationship_id
    description: The relationship between CONCEPT_ID_1 and CONCEPT_ID_2. Please see
      the Vocabulary Conventions. for more information.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:relationship_id
    alias: relationship_id
    owner: ConceptRelation
    domain_of:
    - ConceptRelation
    range: Relationship
    required: true
  conceptRelation__valid_start_date:
    name: conceptRelation__valid_start_date
    description: The date when the relationship is first recorded.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:valid_start_date
    alias: valid_start_date
    owner: ConceptRelation
    domain_of:
    - ConceptRelation
    range: string
    required: true
  conceptRelation__valid_end_date:
    name: conceptRelation__valid_end_date
    description: The date when the relationship is invalidated.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:valid_end_date
    alias: valid_end_date
    owner: ConceptRelation
    domain_of:
    - ConceptRelation
    range: string
    required: true
  conceptRelation__invalid_reason:
    name: conceptRelation__invalid_reason
    description: "Reason the relationship was invalidated. Possible values are \u2018\
      D\u2019 (deleted), \u2018U\u2019 (updated) or NULL."
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:invalid_reason
    alias: invalid_reason
    owner: ConceptRelation
    domain_of:
    - ConceptRelation
    range: string
  conceptSynonym__concept_id:
    name: conceptSynonym__concept_id
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_id
    alias: concept_id
    owner: ConceptSynonym
    domain_of:
    - ConceptSynonym
    range: Concept
    required: true
  conceptSynonym__concept_synonym_name:
    name: conceptSynonym__concept_synonym_name
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_synonym_name
    alias: concept_synonym_name
    owner: ConceptSynonym
    domain_of:
    - ConceptSynonym
    range: string
    required: true
  conceptSynonym__language_concept_id:
    name: conceptSynonym__language_concept_id
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:language_concept_id
    alias: language_concept_id
    owner: ConceptSynonym
    domain_of:
    - ConceptSynonym
    range: Concept
    required: true
  concept__concept_id:
    name: concept__concept_id
    description: A unique identifier for each Concept across all domains.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_id
    identifier: true
    alias: concept_id
    owner: Concept
    domain_of:
    - Concept
    range: string
    required: true
  concept__concept_name:
    name: concept__concept_name
    description: An unambiguous, meaningful and descriptive name for the Concept.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_name
    alias: concept_name
    owner: Concept
    domain_of:
    - Concept
    range: string
    required: true
  concept__domain_id:
    name: concept__domain_id
    description: A foreign key to the DOMAIN table the Concept belongs to.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:domain_id
    alias: domain_id
    owner: Concept
    domain_of:
    - Concept
    range: Domain
    required: true
  concept__vocabulary_id:
    name: concept__vocabulary_id
    description: A foreign key to the VOCABULARY table indicating from which source
      the Concept has been adapted.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:vocabulary_id
    alias: vocabulary_id
    owner: Concept
    domain_of:
    - Concept
    range: Vocabulary
    required: true
  concept__concept_class_id:
    name: concept__concept_class_id
    description: "The attribute or concept class of the Concept. Examples are \u2018\
      Clinical Drug\u2019, \u2018Ingredient\u2019, \u2018Clinical Finding\u2019 etc."
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_class_id
    alias: concept_class_id
    owner: Concept
    domain_of:
    - Concept
    range: ConceptClass
    required: true
  concept__standard_concept:
    name: concept__standard_concept
    description: "This flag determines where a Concept is a Standard Concept, i.e.\
      \ is used in the data, a Classification Concept, or a non-standard Source Concept.\
      \ The allowable values are \u2018S\u2019 (Standard Concept) and \u2018C\u2019\
      \ (Classification Concept), otherwise the content is NULL."
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:standard_concept
    alias: standard_concept
    owner: Concept
    domain_of:
    - Concept
    range: string
  concept__concept_code:
    name: concept__concept_code
    description: The concept code represents the identifier of the Concept in the
      source vocabulary, such as SNOMED-CT concept IDs, RxNorm RXCUIs etc. Note that
      concept codes are not unique across vocabularies.
    from_schema: https://timformatie.github.io/SEIN-OMOP/omop-cdm54
    slot_uri: omop_cdm54:concept_code
    alias: concept_code
    owner: Concept
    domain_of:
    - Concept
    range: string
    required: true
  concept__valid_start_date:
    name: concept__valid_start_date
    description: The date when the Concept was first recorded. The default value is
