    from_schema: https://example.org/omop_named_sets
    slots:
    - name
    - named_enumerators
    - named_concepts
    - named_groups
    class_uri: https://example.org/omop_named_sets/CDMSemanticUnits
  OmopSemanticObject:
    name: OmopSemanticObject
    definition_uri: https://athena.ohdsi.org/search-terms/terms/OmopSemanticObject
    description: 'Abstract base class for OMOP semantic objects.  Used to represent
      concepts, groups of concepts, enumerations of concepts, and value sets of concepts
      in the context of defining complex semantic structures for the OMOP CDM.

      '
    from_schema: https://example.org/omop_semantics
    abstract: true
    slots:
    - class_uri
    - name
    - notes
    class_uri: omop:OmopSemanticObject
  OmopGroup:
    name: OmopGroup
    definition_uri: https://athena.ohdsi.org/search-terms/terms/OmopGroup
    description: 'Named group of OMOP concepts defined by their membership in a particular
      group, such  as hierarchy and / or domain. Importantly, this is not a static
      definition and if the vocabularies are updated, the membership of these groups
      may change. This is intended to be used for defining sets of concepts that are
      used in semantic definitions, such as the set of all  T stage concepts.

      '
    from_schema: https://example.org/omop_semantics
    is_a: OmopSemanticObject
    slots:
    - name
    - notes
    - parent_concepts
    - OmopGroup_class_uri
    slot_usage:
      class_uri:
        name: class_uri
        equals_string: OmopGroup
    class_uri: omop:OmopGroup
  OmopConcept:
    name: OmopConcept
    definition_uri: https://athena.ohdsi.org/search-terms/terms/OmopConcept
    description: A single labelled OMOP concept for use in higher level semantic annotations
    from_schema: https://example.org/omop_semantics
    is_a: OmopSemanticObject
    slots:
    - name
    - notes
    - concept_id
    - label
    - OmopConcept_class_uri
    slot_usage:
      class_uri:
        name: class_uri
        equals_string: OmopConcept
    class_uri: omop:OmopConcept
  OmopEnum:
    name: OmopEnum
    definition_uri: https://athena.ohdsi.org/search-terms/terms/OmopEnum
    description: 'Enumeration (static) of permissible values for a particular slot.
      This is intended to be used for defining slots that have a fixed set of permissible
      values, such as the staging axis (T, N, M, Group). This will not update dynamically
      with vocabulary updates, so should be used for concepts that are  short lists
      and not expected to change over time.

      '
    from_schema: https://example.org/omop_semantics
    is_a: OmopSemanticObject
    slots:
    - name
    - notes
    - enum_members
    - OmopEnum_class_uri
    slot_usage:
      class_uri:
        name: class_uri
        equals_string: OmopEnum
    class_uri: omop:OmopEnum
  OmopValueSet:
    name: OmopValueSet
    definition_uri: https://athena.ohdsi.org/search-terms/terms/OmopValueSet
    description: 'A semantic grouping of mixed types of permissible values for a template
      slot. Members may be OmopConcepts, OmopGroups, or OmopEnums. This represents
      a registry-level value domain, not a direct OMOP structure.

      '
    from_schema: https://example.org/omop_semantics
    is_a: OmopSemanticObject
    slots:
    - name
    - notes
    - members
    - OmopValueSet_class_uri
    slot_usage:
      class_uri:
        name: class_uri
        equals_string: OmopValueSet
    class_uri: omop:OmopValueSet
  Concept:
    name: Concept
    definition_uri: https://athena.ohdsi.org/search-terms/terms/Concept
    description: 'Concept that serves as a member of a semantic object. This is intended
      to be used for defining the permissible values of an OmopSemanticObject, such
      as the members of an OmopGroup or OmopEnum.  The concept_id and label slots
      are used to specify the concept_id and label of the concept that serves as a  member
      of the enumeration.

      '
    from_schema: https://example.org/omop_semantics
    slots:
    - concept_id
    - label
    class_uri: omop:Concept
